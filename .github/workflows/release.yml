name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run typecheck
      - run: npm run test
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build --workspace=extension
      - name: Zip built extension
        run: (cd extension/dist && zip -r "../../shelve-extension-${GITHUB_REF_NAME}.zip" .)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: shelve-extension-${{ github.ref_name }}.zip
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's in this release.

            **Extension:** download `shelve-extension-${{ github.ref_name }}.zip` below, unzip it, then `chrome://extensions` → enable Developer mode → **Load unpacked** → select the unzipped folder.
            **Backend:** see [README.md](https://github.com/${{ github.repository }}/blob/main/README.md#setup) — the Worker is deployed from source via Wrangler, not packaged here.
